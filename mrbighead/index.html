var isPlaying=0;
var sayings=0;

function getRandomInt(max) {
  return Math.floor(Math.random() * max);
}

function playSaying(theItem) {
	if(myAudio.currentTime>=myAudio.duration) {isPlaying=0;}
	if(isPlaying==1) {return;}
    if(theItem=='rnd') {
	  theItem=getRandomInt(25)+1;
	  theItem=str(theItem);
	}
	if (prevSaying=="") {theItem="1";}
	prevSaying=theItem;
	var x = document.getElementById("myAudio");
	x.src="audio/speech" +" ("+theItem+").mp3";
	x.play();
	isPlaying=1;
}

function playAudio(theItem) {
	if(myAudio.currentTime>=myAudio.duration) {isPlaying=0;}
	if(isPlaying==1) {return;}
	playAudio1(theItem);
	isPlaying=1;
}
